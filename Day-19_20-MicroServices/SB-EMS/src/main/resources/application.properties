spring.application.name=SB-EMS-SERVICE
#Embedded TomCat port number using server.port property
server.port = 1111

#Database connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/training
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Application Properties
ems.save.success = "SUCCESS : Employee Object Saved"
ems.update.success = "SUCCESS : Employee Object Updated"
ems.delete.success= "SUCCESS: Employee Object Deleted"

#application error properties
ems.invalid.employee-details="FAILED: Invalid Employee Details";
ems.invalid.employee-notfound="FAILED: Employee Not Found";
ems.db.failed = "FAILED : DB Error "

#Stop registering as a client. It is a Server
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true