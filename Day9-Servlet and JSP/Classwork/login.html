<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Login Page</title>
<link href="LoginStyle.css" rel="stylesheet"></link>
</head>
<body>
<form action="Login" method = "post" > <!-- by using action we can call servlet, In action we have to keep url pattern --> 
	<div class="Logindiv">
		<table>
			<tr>
				<td>Username :</td>
				<td><input type="text" name="username"></td>
			</tr>
			<tr>
				<td>Password :</td>
				<td><input type="password" name="password"> </td>
			</tr>
			<tr>
				<td colspan="2" align="center"><input type="submit"
					value="Login" class="Loginbutton"></input></td>
			</tr>
		</table>
	</div>
	</form>

</body>
</html>
