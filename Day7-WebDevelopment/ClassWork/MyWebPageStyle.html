<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<!--  Internal css -->
<style type="text/css">
/* TAG SELECTOR */
	h1 {
		color: blue;
	}
/* ID SELECTOR*/	
	#myh1 {
		color: green;
	}
/* CLASS SELECTOR*/	
	.myclass1 {
		color: red;
	}
</style>
</head>
<body>


	<h1>Reshma</h1>
	<h1 id="myh1">Reshma</h1>
	<h1 class="myclass1">Reshma</h1>
	<!--  inline css -->
	<b style="color:orange">HTML</b>

</body>
</html>
