<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>TimeTable</title>
<style>
table{
border:4px doublegray;
margin:auto;
width:90%;
}
th,td{
padding:15px;
}
</style>
</head>
<body>
<div>
	<table border="1">
		<tr>
		<th colspan="6">Time Table</th>
		</tr>
		<tr>
		<th rowspan="6">Hours</th>
		<th>Mon</th>
		<th>Tue</th>
		<th>Wed</th>
		<th>Thu</th>
		<th>Fri</th>
		</tr>
		<tr>
		<td>Science</td>
		<td>Maths</td>
		<td>Science</td>
		<td>Maths</td>
		<td>Arts</td>
		</tr>
		<tr>
		<td>Science</td>
		<td>Maths</td>
		<td>Science</td>
		<td>Maths</td>
		<td>Arts</td>
		</tr>
		<tr>
		<th colspan="5">LUNCH</th>
		<tr>
		<td>Science</td>
		<td>Maths</td>
		<td>Science</td>
		<td>Maths</td>
		<td rowspan="2">Project</td>
		</tr>
		<tr>
		<td>Science</td>
		<td>Maths</td>
		<td>Science</td>
		<td>Maths</td>
		</tr>
	</table>
</div>	
</body>
</html>
