<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap Grid Example</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.header{
    background:#4d73bd;
    height:130px;
    border-radius:25px;
}

.column1{
    background:#73b043;
    height:350px;
    border-radius:40px;
    padding: 3px;
}

.column2{
    background:#f57c2a;
    height:350px;
    border-radius:40px;
    padding: 3px;
}

.column3{
    background:#ffc107;
    height:350px;
    border-radius:40px;
    padding: 3px;
}

.footer{
    background:#5b9bd5;
    height:60px;
    border-radius:10px;
}

.box{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
}

.footerText{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100%;
    font-size:35px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="row">
        <div class="col-12">
            <div class="header box">
                Header
            </div>
        </div>
    </div>

    <!-- Columns -->
    <div class="row mt-3">

        <div class="col-4">
            <div class="column1 box">
                Column 1
            </div>
        </div>

        <div class="col-4">
            <div class="column2 box">
                Column 2
            </div>
        </div>

        <div class="col-4">
            <div class="column3 box">
                Column 3
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="row mt-3">
        <div class="col-12">
            <div class="footer footerText">
                Footer
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
