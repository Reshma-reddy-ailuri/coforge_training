<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<!-- Internal CSS -->
<script type="text/javascript">
	function sayWelcome() {
		document.write("<b><font color='green'>Welcome to Javascript</font></b>");
	}
	function sayHello() {
		var name="Reshma" ;
		alert("Hello" + name);
	}
</script>
</head>
<body>
<!-- Inline JavaScript -->
<button onclick="sayWelcome()">Welcome </button>
<button onclick="sayHello()">Hello</button>

</body>
</html>
